name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create release with changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract changelog for this version
        id: changelog
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between "## [$VERSION]" and the next "## [".
          BODY=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
          # Write to a file to preserve newlines in the GH Actions output.
          echo "$BODY" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md

  linux:
    name: Linux artifacts (.deb, .rpm, raw binary)
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux tray build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release -p clipboardwire

      - name: Strip binary
        run: strip target/release/clipboardwire

      - name: Build .deb
        run: cargo deb -p clipboardwire --no-build

      - name: Build .rpm
        # cargo-generate-rpm's -p flag is a path, not a package name (unlike
        # cargo proper). Point it at the binary crate's manifest.
        run: cargo generate-rpm -p cli

      - name: Rename raw binary for the release asset
        run: |
          mkdir -p dist
          cp target/release/clipboardwire dist/clipboardwire-linux-x86_64
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true

  macos:
    name: macOS artifacts (universal binary)
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          # macos-latest is currently Apple Silicon; we cross-build to
          # x86_64 too and lipo them into a universal binary so a single
          # download works on both Intel + ARM Macs.
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build aarch64 binary
        run: cargo build --release --target aarch64-apple-darwin -p clipboardwire

      - name: Build x86_64 binary
        run: cargo build --release --target x86_64-apple-darwin -p clipboardwire

      - name: Lipo into a universal binary + strip
        run: |
          mkdir -p dist
          lipo -create -output dist/clipboardwire-macos-universal \
            target/aarch64-apple-darwin/release/clipboardwire \
            target/x86_64-apple-darwin/release/clipboardwire
          strip dist/clipboardwire-macos-universal
          # Also ship the per-arch binaries for users who prefer them.
          cp target/aarch64-apple-darwin/release/clipboardwire dist/clipboardwire-macos-aarch64
          cp target/x86_64-apple-darwin/release/clipboardwire dist/clipboardwire-macos-x86_64

      - name: Build .icns from the bundled PNG
        run: |
          set -euo pipefail
          ICONSET=clipboardwire.iconset
          mkdir -p "$ICONSET"
          sips -z 16 16   assets/icon-256.png --out "$ICONSET/icon_16x16.png"
          sips -z 32 32   assets/icon-256.png --out "$ICONSET/icon_16x16@2x.png"
          sips -z 32 32   assets/icon-256.png --out "$ICONSET/icon_32x32.png"
          sips -z 64 64   assets/icon-256.png --out "$ICONSET/icon_32x32@2x.png"
          sips -z 128 128 assets/icon-256.png --out "$ICONSET/icon_128x128.png"
          sips -z 256 256 assets/icon-256.png --out "$ICONSET/icon_128x128@2x.png"
          sips -z 256 256 assets/icon-256.png --out "$ICONSET/icon_256x256.png"
          # icon-256.png is only 256 px so the highest 512px slot reuses it; macOS
          # is happy with that for an app this small.
          sips -z 512 512 assets/icon-256.png --out "$ICONSET/icon_256x256@2x.png"
          mkdir -p build
          iconutil -c icns "$ICONSET" -o build/clipboardwire.icns

      - name: Assemble clipboardwire.app
        run: |
          set -euo pipefail
          # Strip the leading "v" from the tag (vX.Y.Z → X.Y.Z) for the
          # CFBundleVersion fields.
          VERSION="${GITHUB_REF_NAME#v}"
          # Build the bundle in a scratch dir so dist/ stays a flat
          # list of upload artifacts (softprops/action-gh-release's
          # `dist/*` glob doesn't deal with directories well).
          mkdir -p build
          APP=build/clipboardwire.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp dist/clipboardwire-macos-universal "$APP/Contents/MacOS/clipboardwire"
          chmod +x "$APP/Contents/MacOS/clipboardwire"
          cp build/clipboardwire.icns "$APP/Contents/Resources/clipboardwire.icns"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleIdentifier</key>
            <string>com.davefx.clipboardwire</string>
            <key>CFBundleName</key>
            <string>clipboardwire</string>
            <key>CFBundleDisplayName</key>
            <string>clipboardwire</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>clipboardwire</string>
            <key>CFBundleIconFile</key>
            <string>clipboardwire.icns</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <!-- clipboardwire lives in the menu bar; it has no main
                 window of its own, so we hide it from the Dock and the
                 app switcher. -->
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          plutil -lint "$APP/Contents/Info.plist"

      - name: Build .dmg
        run: |
          set -euo pipefail
          # Stage just the .app + an /Applications symlink in a scratch
          # folder so the DMG window opens with one obvious drag-target.
          STAGE=build/dmg-stage
          mkdir -p "$STAGE"
          cp -R build/clipboardwire.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname clipboardwire \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            dist/clipboardwire-macos-universal.dmg

      - name: Stage the .app archive (.tar.gz) as an upload-friendly artifact
        run: |
          set -euo pipefail
          # softprops/action-gh-release can't preserve directory
          # structure, so the raw .app gets tarred. Users who prefer
          # the bundle over the DMG can `tar -xzf` it into /Applications.
          tar -C build -czf dist/clipboardwire-macos.app.tar.gz clipboardwire.app

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true

  android:
    name: Android APK
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             dist/clipboardwire-android.apk

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true

  windows:
    name: Windows artifacts (.exe and .msi)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install --locked cargo-wix

      - name: Build release binary
        run: cargo build --release -p clipboardwire

      - name: Build MSI
        # `--no-build` reuses the binary we built in the previous step.
        run: cargo wix -p clipboardwire --no-build --nocapture

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\clipboardwire.exe dist\clipboardwire-windows-x86_64.exe
          Copy-Item target\wix\*.msi dist\

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
