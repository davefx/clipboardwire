name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux tray build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux tray build + runtime deps (incl. xvfb + dbus for GUI tests)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev libxdo-dev \
            xvfb dbus \
            libxkbcommon-x11-0 libxkbcommon0 \
            libfontconfig1 \
            libgl1 libgles2 libegl1 \
            libxcb-render0 libxcb-shape0 libxcb-xfixes0 \
            libwayland-client0 libwayland-egl1 libwayland-cursor0 \
            mesa-utils libglx-mesa0
          # llvmpipe gives a software GL renderer under xvfb so eframe's
          # `glow` backend can init without a real GPU.
          glxinfo -B || true
      - run: cargo test --workspace
      - name: GUI smoke (tray init) — Linux under xvfb
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace -- --ignored connect_tray
      - name: GUI interaction (DBus menu + Edit/Reload/Quit) — Linux
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace --test tray_dbus_linux -- --ignored
      - name: Singleton lock (second tray exits) — Linux
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace --test singleton_lock -- --ignored --nocapture
      - name: GUI interaction (embedded hub binds) — Linux
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace --test hub_mode -- --ignored
      - name: GUI smoke (tray init) — Windows
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace -- --ignored connect_tray
      - name: GUI interaction (UIA tray discovery) — Windows
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --test tray_uia_windows -- --ignored --nocapture
      - name: Singleton lock (second tray exits) — Windows
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --test singleton_lock -- --ignored --nocapture
      - name: GUI smoke (tray init) — macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace -- --ignored connect_tray
      - name: Singleton lock (second tray exits) — macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --test singleton_lock -- --ignored --nocapture
      - name: GUI interaction (embedded hub binds) — macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --test hub_mode -- --ignored
      - name: File-clipboard roundtrip — Linux
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a cargo test --workspace --test clipboard_files_roundtrip -- --ignored --nocapture
      - name: File-clipboard roundtrip — Windows
        if: matrix.os == 'windows-latest'
        run: cargo test --workspace --test clipboard_files_roundtrip -- --ignored --nocapture
      - name: File-clipboard roundtrip — macOS
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace --test clipboard_files_roundtrip -- --ignored --nocapture

  android-unit:
    name: Android JVM tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android JVM unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest

  android-instrumented:
    name: Android instrumented tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Android instrumented tests (emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          working-directory: android
          script: ./gradlew connectedDebugAndroidTest

  android-server-integration:
    name: Android ↔ Rust server integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build clipboardwire server
        run: cargo build --release -p clipboardwire

      - name: Start hub in background
        env:
          CLIPBOARDWIRE_BIND: 0.0.0.0:18484
          CLIPBOARDWIRE_USER: testuser
          CLIPBOARDWIRE_PASSWORD: testpass
          CLIPBOARDWIRE_TLS_DISABLE: "1"
        run: |
          nohup target/release/clipboardwire serve > /tmp/hub.log 2>&1 &
          echo $! > /tmp/hub.pid
          sleep 2
          # Verify it's listening
          ss -tlnp | grep 18484

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Integration tests (emulator → real server)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect
          disable-animations: true
          working-directory: android
          script: >-
            ./gradlew connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.testServerUrl=ws://10.0.2.2:18484/sync

  notify-recovery:
    name: CI recovered
    if: ${{ github.event_name == 'pull_request' }}
    needs: [lint, test, android-unit, android-instrumented, android-server-integration]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Check if previous run failed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.head_ref }}
        run: |
          PREV=$(gh run list \
            --branch "$BRANCH" \
            --workflow CI \
            --event pull_request \
            --status completed \
            --json databaseId,conclusion \
            --jq "[.[] | select(.databaseId != ($CURRENT_RUN_ID | tonumber))][0].conclusion")

          echo "Previous run conclusion: $PREV"

          if [ "$PREV" = "failure" ] || [ "$PREV" = "timed_out" ]; then
            gh pr comment "$PR_NUMBER" \
              --body ":large_green_circle: **CI recovered** — all jobs green again."
          fi
