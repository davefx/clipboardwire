name: Bump Homebrew cask

# Fires after a release is published. Rewrites the cask in
# davefx/homebrew-clipboardwire so `brew upgrade --cask clipboardwire`
# picks up the new version automatically. The release.yml workflow
# uploads the .dmg first; this one then reads the new URL + SHA-256.

on:
  # GitHub silently drops `release: published` events when the release
  # is created by GITHUB_TOKEN (anti-loop guard), so chain off the
  # Release workflow finishing instead. Allow manual re-runs too.
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bump the cask to (e.g. v0.4.0). Defaults to the latest."
        required: false
        type: string

permissions:
  contents: read

jobs:
  bump:
    # `workflow_run` fires on ALL outcomes; only proceed if the
    # Release we're chaining off actually succeeded.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Compute new version + SHA-256
        id: vars
        run: |
          set -euo pipefail
          # Three sources of the tag, by precedence:
          # 1) explicit input from workflow_dispatch
          # 2) the head_branch of the triggering workflow_run (a tag
          #    push has this set to the tag name, e.g. "v0.4.0")
          # 3) gh CLI fallback to the latest release
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.workflow_run.head_branch }}"
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "main" ]; then
            TAG=$(gh release view --json tagName --jq .tagName --repo davefx/clipboardwire)
          fi
          VERSION="${TAG#v}"
          DMG_URL="https://github.com/davefx/clipboardwire/releases/download/v${VERSION}/clipboardwire-macos-universal.dmg"
          curl -sL -o /tmp/clipboardwire.dmg "$DMG_URL"
          SHA256=$(sha256sum /tmp/clipboardwire.dmg | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check out the tap repo
        uses: actions/checkout@v6
        with:
          repository: davefx/homebrew-clipboardwire
          # A personal access token with `repo` scope is needed here
          # because the default GITHUB_TOKEN is scoped to this repo.
          # The secret name `HOMEBREW_TAP_TOKEN` must be set in the
          # main repo's Settings → Secrets → Actions.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Rewrite the cask
        run: |
          set -euo pipefail
          VERSION="${{ steps.vars.outputs.version }}"
          SHA256="${{ steps.vars.outputs.sha256 }}"
          cd tap
          # Replace the version + sha256 lines, leaving everything
          # else untouched (URL is templated off `version` so it
          # picks up the bump automatically).
          sed -i.bak -E "s/^( *version *).*/\1\"$VERSION\"/" Casks/clipboardwire.rb
          sed -i.bak -E "s/^( *sha256 *).*/\1\"$SHA256\"/"   Casks/clipboardwire.rb
          rm -f Casks/clipboardwire.rb.bak

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "No cask changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/clipboardwire.rb
          git commit -m "Bump clipboardwire cask to ${{ steps.vars.outputs.version }}"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying in $((attempt * 10))s…"
            sleep $((attempt * 10))
          done
          echo "All push attempts failed."
          exit 1
